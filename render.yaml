services:
  - type: web
    name: route53-clone-backend
    runtime: python
    pythonVersion: "3.11"
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEBUG
        value: false
      - key: DEMO_EMAIL
        value: admin@example.com
      - key: DEMO_PASSWORD
        value: password123
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./route53.db
